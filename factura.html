<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexoSync</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Cookie&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/home.css">
</head>
<body>

        <div class="wrapper">
            <header class="header-mobile">
                <h1 class="logo">Nexosync</h1>
                <button class="open-menu" id="open-menu">
                    <i class="bi bi-list"></i>
                </button>
            </header>
        <aside>
            <header>
                <h1 class="logo">Nexosync</h1>
            </header>
            <nav>
                <ul class="menu">
                    <li>
                        <a class="boton-menu boton-volver" href="pedido.html">
                            <i class="bi bi-arrow-left-circle-fill"></i>Volver
                        </a>
                    </li>
                    <li>
                        <a class="boton-menu boton-factura active" href="factura.html">
                            <i class="bi bi-cart3"></i>Pedido
                        </a>
                    </li>
                </ul>
            </nav>
            <footer>
                <p class="texto-footer">© 2026 NexoSync</p>
            </footer>
        </aside>
        <main>
            <h2 class="titulo-principal">Pedido</h2>
            <div class="contenedor-carrito">
                <p id="carrito-vacio" class="carrito-vacio">Tu Pedido Esta Vacio<i class="bi bi-emoji-frown"></i></p>

                <div id="carrito-producto" class="carrito-productos disabled">
                    <div class="carrito-producto">
                    </div>
                </div>
                <div id="carrito-acciones" class="carrito-acciones disabled">

                    <div class="carrito-acciones-izquierda">
                        <button id="carrito-acciones-vaciar" class="carrito-acciones-vaciar">Vaciar Carrito</button>
                    </div>
                    <div class="carrito-acciones-derecha">
                        <div class="carrito-acciones-total">
                            <p>Total:</p>
                            <p id="total">$36000</p>
                        </div>
                        <button id="carrito-acciones-comprar" class="carrito-acciones-comprar">Ordenar</button>
                    </div>
                </div>
                    <p id="carrito-comprado" class="carrito-comprado disabled">Muchas Gracias Por Tu Compra<i class="bi bi-emoji-laughing"></i></p>
            </div>
        </main>
    </div>

    <script src="./js/factura.js"></script>

</body>
</html>
