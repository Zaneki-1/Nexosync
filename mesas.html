css/<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexoSync - Mesas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Cookie&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/home.css">
    <link rel="stylesheet" href="./css/mesas.css">
</head>
<body>
    <div class="wrapper">
        <aside>
            <header>
                <h1 class="logo">Nexosync</h1>
            </header>
            <nav>
                <ul class="menu">
                    <li>
                        <button class="boton-menu boton-categoria" onclick="window.location.href='home.html'"><i class="bi bi-hand-index-thumb-fill"></i>Todos Los Productos</button>
                    </li>
                    <li>
                        <button class="boton-menu boton-categoria" onclick="window.location.href='clientes.html'"><i class="bi bi-hand-index-thumb"></i>Clientes</button>
                    </li>
                    <li>
                        <button class="boton-menu boton-categoria active"><i class="bi bi-hand-index-thumb-fill"></i>Mesas</button>
                    </li>
                    <li>
                        <a class="boton-menu boton-categoria" href="pedido.html"><i class="bi bi-hand-index-thumb"></i>Pedidos</a>
                    </li>
                    <li>
                        <a class="boton-menu boton-volver" href="principal.html">
                            <i class="bi bi-arrow-left-circle-fill"></i>Salir
                        </a>
                    </li>
                </ul>
            </nav>
            <footer>
                <p class="texto-footer">© 2026 NexoSync</p>
            </footer>
        </aside>

        <main>
            <div class="mesas-header">
                <h2 class="titulo-principal">Gestión de Mesas</h2>
                <div class="mesas-leyenda">
                    <span class="leyenda-item"><span class="dot libre"></span> Libre</span>
                    <span class="leyenda-item"><span class="dot ocupado"></span> Ocupado</span>
                    <span class="leyenda-item"><span class="dot mantenimiento"></span> Mantenimiento</span>
                </div>
            </div>

            <!-- Resumen rápido -->
            <div class="mesas-resumen">
                <div class="resumen-card" id="res-total">
                    <i class="bi bi-grid-3x3-gap-fill"></i>
                    <div>
                        <span class="resumen-num" id="total-num">12</span>
                        <span class="resumen-label">Total Mesas</span>
                    </div>
                </div>
                <div class="resumen-card" id="res-libre">
                    <i class="bi bi-check-circle-fill"></i>
                    <div>
                        <span class="resumen-num" id="libres-num">0</span>
                        <span class="resumen-label">Libres</span>
                    </div>
                </div>
                <div class="resumen-card" id="res-ocupado">
                    <i class="bi bi-person-fill"></i>
                    <div>
                        <span class="resumen-num" id="ocupadas-num">0</span>
                        <span class="resumen-label">Ocupadas</span>
                    </div>
                </div>
                <div class="resumen-card" id="res-mant">
                    <i class="bi bi-wrench-adjustable"></i>
                    <div>
                        <span class="resumen-num" id="mant-num">0</span>
                        <span class="resumen-label">Mantenimiento</span>
                    </div>
                </div>
            </div>

            <!-- Grid de mesas -->
            <div class="mesas-grid" id="mesas-grid"></div>
        </main>
    </div>

    <!-- Modal cambio de estado -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-mesa">
            <div class="modal-header">
                <h3 id="modal-titulo">Mesa 1</h3>
                <button class="modal-cerrar" id="modal-cerrar"><i class="bi bi-x-lg"></i></button>
            </div>
            <p class="modal-subtitulo">Selecciona el nuevo estado de la mesa:</p>
            <div class="modal-estados">
                <button class="btn-estado btn-libre" data-estado="libre">
                    <i class="bi bi-check-circle-fill"></i> Libre
                </button>
                <button class="btn-estado btn-ocupado" data-estado="ocupado">
                    <i class="bi bi-person-fill"></i> Ocupado
                </button>
                <button class="btn-estado btn-mantenimiento" data-estado="mantenimiento">
                    <i class="bi bi-wrench-adjustable"></i> Mantenimiento
                </button>
            </div>
            <div class="modal-info" id="modal-info">
                <label>Capacidad:</label>
                <span id="modal-capacidad">—</span>
            </div>
        </div>
    </div>

    <script src="./js/mesas.js"></script>
</body>
</html>
