<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexoSync - Iniciar Sistema</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Cookie&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/principal.css">
</head>
<body>

    <div class="wrapper">
        <aside>
            <header>
                <h1 class="logo">Nexosync</h1>
            </header>
            <nav>
                <ul class="menu">
                    <li>
                        <button class="boton-menu boton-categoria active" id="admin">
                            <i class="bi bi-shield-lock"></i>Administrador
                        </button>
                    </li>
                    <li>
                        <button class="boton-menu boton-categoria" id="cajero">
                            <i class="bi bi-cash-stack"></i>Cajero
                        </button>
                    </li>
                    <li>
                        <button class="boton-menu boton-categoria" id="mesero">
                            <i class="bi bi-person-badge"></i>Mesero
                        </button>
                    </li>
                    <li>
                        <button class="boton-menu boton-categoria" id="cocinero">
                            <i class="bi bi-egg-fried"></i>Cocinero
                        </button>
                    </li>
                    <li>
                        <a class="boton-menu boton-volver" href="inicio.html">
                            <i class="bi bi-arrow-left-circle-fill"></i>Salir
                        </a>
                    </li>
                </ul>
            </nav>
            <footer>
                <p class="texto-footer">© 2026 NexoSync</p>
            </footer>
        </aside>

        <main>
            <h2 class="titulo-principal">Administrador</h2>
            
            <div class="contenedor-login">
                <div class="login-card producto-detalle">
                    <i class="bi bi-person-circle login-icon"></i>
                    
                    <p class="texto-ingrese-usuario-roles">Panel de Acceso</p>
                    
                    <div class="input-group">
                        <input type="password" id="pin-acceso" placeholder="Ingrese su PIN">
                    </div>

                    <a href="home.html" class="boton-entrar-login">
                        Ingresar <i class="bi bi-box-arrow-in-right"></i>
                    </a>
                </div>
            </div>
        </main>
    </div>

    <script src="./js/principal.js"></script>
</body>
</html>
